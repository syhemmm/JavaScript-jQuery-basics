<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le bouton capricieux</title>
    <style>
      
        #btn-non {
            position: absolute; /*Crucial pour le deplacement */
            padding: 10px 20px;
            cursor: pointer;
        }
        #btn-oui {
            transition: all 0,2s; /*gere la fluidité*/
            padding: 10px 20px;
            cursor: pointer;
           
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="exo3.js" defer></script>
</head>
<body>

    <h1>ca va ?</h1>

    <button id="btn-oui">OUI</button>
    <button id="btn-non">NON</button>

</body>
</html>
